<h1>Hello from AKS CI/CD DEMO v1</h1>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Page</title>
    <style>
        body {
            /* Background Image Setup */
            background-image: url('background.jpg'); /* Ensure this image exists */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* Basic Styling */
            color: yellow;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .content {
            background-color: rgba(0, 0, 0, 0.6); /* Transparent black box */
            padding: 50px;
            text-align: center;
            margin-top: 100px;
        }

        /* Marquee Styling */
        .marquee-container {
            background-color: #333;
            color: yellow;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is a simple static page with a background image.</p>
    </div>

    <!-- Marquee Direction Options: left, right, up, down -->
    <marquee direction="left" scrollamount="10" class="marquee-container">
        *** Welcome! Enjoy your stay. New content scrolling here... ***
    </marquee>

</body>
</html>
